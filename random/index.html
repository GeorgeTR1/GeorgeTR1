<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Random Post</title>
  <style>
    html {
      background-color:black;
      color:white;
    }
    a {
      color:rgb(102, 177, 250);
    }
    body {
      max-width:50em;
    }
  </style>
</head>

<body>
<div id="test"></div>
  
  <script>
    var allText = "";
    var test = document.getElementById("test");
    var links, i;
    
    var rawFile = new XMLHttpRequest();
    var embedReq = new XMLHttpRequest();
  
    rawFile.onload = function() { 
        if (rawFile.status == 200) {
          allText = rawFile.responseText;
          load();
        }
    }

    rawFile.open("GET", "links.txt", true);
    rawFile.send(null);
    
    function load() {
      links = allText.split("\n");
      shuffle(links);
      
      i = 0;
        
      embed();
    }

    function shuffle(arr) {
      var i = arr.length, j, temp;
      while(--i > 0){
        j = Math.floor(Math.random()*(i+1));
        temp = arr[j];
        arr[j] = arr[i];
        arr[i] = temp;
      }
    }

    function embed() {
      var url = "https://corsproxy.io/?" + encodeURIComponent("https://www.reddit.com/oembed?url=" + links[i].trim());
      
      embedReq.onload = function() {
        if (embedReq.status == 200) {
          var data = JSON.parse(embedReq.response);
          test.innerHTML += data.html;
          
          test.lastElementChild.remove();
          test.lastElementChild.removeAttribute("style");

          var innerLinks = test.lastElementChild.querySelectorAll("a");
          for (const node of innerLinks) {
            node.setAttribute("target","_blank");
          }
          i++;
          
          if (i < 20) {
            embed();
          }
        }
      }
      
      embedReq.open("GET", url, true);
      embedReq.send(null);
    }
  </script>
</body>

</html>
